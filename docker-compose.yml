version: '3.8'

services:
  # Base de datos
  db:
    image: postgres:18.4-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  # Servidor Backend
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: go_backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=password123
      - DB_NAME=app_db
      - DB_PORT=5432

volumes:
  pg_data: